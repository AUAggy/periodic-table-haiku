<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table - Haiku Edition</title>

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">

<!-- Open Graph Metadata -->
<meta property="og:title" content="Aggy's Periodic Table: Haiku Edition">
<meta property="og:description" content="118 interactive elements with sassy, dark, and punchy haikus. No dry textbook energy here.">
<meta property="og:image" content="screenshot.png">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e12;
    --surface: #14161d;
    --surface2: #1c1f2a;
    --border: rgba(255,255,255,0.06);
    --text: #e8eaf0;
    --text-dim: #6b7180;
    --accent: #7ee8a2;

    --reactive-nonmetal: #4ade80;
    --noble-gas: #a78bfa;
    --alkali-metal: #f87171;
    --alkaline-earth: #fb923c;
    --transition-metal: #60a5fa;
    --post-transition: #34d399;
    --metalloid: #fbbf24;
    --halogen: #f472b6;
    --lanthanide: #c084fc;
    --actinide: #fb7185;
    --unknown: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  header {
    padding: 28px 40px 16px;
    display: flex; align-items: baseline; gap: 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 2;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  header span {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .main {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    z-index: 1;
    flex: 1;
  }

  /* LEGEND */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px 18px;
    padding: 14px 40px;
    border-bottom: 1px solid var(--border);
  }

  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.65rem;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .legend-item:hover { color: var(--text); }

  .legend-dot {
    width: 9px; height: 9px; border-radius: 2px;
    flex-shrink: 0;
  }

  /* TABLE */
  .table-wrap {
    padding: 20px 30px 10px;
    overflow-x: auto;
  }

  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, 52px);
    grid-template-rows: repeat(10, 56px);
    gap: 3px;
    width: fit-content;
    margin: 0 auto;
  }

  .haiku-hero {
    grid-column: 3 / 13;
    grid-row: 2 / 4;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    box-shadow: 0 12px 36px rgba(0,0,0,0.45);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 4px;
    position: relative;
    z-index: 2;
    animation: haikuHeroIntro 0.6s ease-out both;
  }

  .haiku-hero::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 8px;
    pointer-events: none;
  }

  .haiku-kicker {
    font-size: 0.48rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .haiku-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(0.8rem, 1.2vw, 1.05rem);
    color: var(--text);
  }

  .haiku-text {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.7rem, 1.2vw, 0.95rem);
    line-height: 1.35;
    color: var(--text);
    white-space: pre-line;
    max-width: 360px;
  }

  .haiku-hint {
    font-size: 0.48rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .haiku-hero.pulse {
    animation: haikuHeroPulse 0.6s ease-out;
  }

  @keyframes haikuHeroIntro {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes haikuHeroPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.015); }
    100% { transform: scale(1); }
  }

  .el {
    position: relative;
    border-radius: 5px;
    padding: 5px 4px 4px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.15s, background 0.15s;
    border: 1px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .el:hover {
    transform: scale(1.18);
    z-index: 10;
  }

  .el.active {
    outline: 2px solid white;
    outline-offset: 1px;
    transform: scale(1.15);
    z-index: 20;
  }

  .el .num {
    font-size: 0.52rem;
    color: rgba(255,255,255,0.45);
    line-height: 1;
    margin-bottom: 1px;
  }

  .el .sym {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.1rem;
    line-height: 1;
    color: rgba(255,255,255,0.95);
  }

  .el .name {
    font-size: 0.42rem;
    color: rgba(255,255,255,0.45);
    line-height: 1;
    margin-top: 1px;
    overflow: hidden;
    white-space: nowrap;
    max-width: 100%;
    text-overflow: ellipsis;
  }

  .el .mass {
    font-size: 0.38rem;
    color: rgba(255,255,255,0.3);
    margin-top: 1px;
  }

  /* Category colors */
  .cat-reactive-nonmetal { background: rgba(74,222,128,0.13); border-color: rgba(74,222,128,0.2); }
  .cat-reactive-nonmetal:hover, .cat-reactive-nonmetal.active { background: rgba(74,222,128,0.22); border-color: rgba(74,222,128,0.5); box-shadow: 0 0 16px rgba(74,222,128,0.25); }

  .cat-noble-gas { background: rgba(167,139,250,0.13); border-color: rgba(167,139,250,0.2); }
  .cat-noble-gas:hover, .cat-noble-gas.active { background: rgba(167,139,250,0.22); border-color: rgba(167,139,250,0.5); box-shadow: 0 0 16px rgba(167,139,250,0.25); }

  .cat-alkali-metal { background: rgba(248,113,113,0.13); border-color: rgba(248,113,113,0.2); }
  .cat-alkali-metal:hover, .cat-alkali-metal.active { background: rgba(248,113,113,0.22); border-color: rgba(248,113,113,0.5); box-shadow: 0 0 16px rgba(248,113,113,0.25); }

  .cat-alkaline-earth { background: rgba(251,146,60,0.13); border-color: rgba(251,146,60,0.2); }
  .cat-alkaline-earth:hover, .cat-alkaline-earth.active { background: rgba(251,146,60,0.22); border-color: rgba(251,146,60,0.5); box-shadow: 0 0 16px rgba(251,146,60,0.25); }

  .cat-transition-metal { background: rgba(96,165,250,0.13); border-color: rgba(96,165,250,0.2); }
  .cat-transition-metal:hover, .cat-transition-metal.active { background: rgba(96,165,250,0.22); border-color: rgba(96,165,250,0.5); box-shadow: 0 0 16px rgba(96,165,250,0.25); }

  .cat-post-transition { background: rgba(52,211,153,0.13); border-color: rgba(52,211,153,0.2); }
  .cat-post-transition:hover, .cat-post-transition.active { background: rgba(52,211,153,0.22); border-color: rgba(52,211,153,0.5); box-shadow: 0 0 16px rgba(52,211,153,0.25); }

  .cat-metalloid { background: rgba(251,191,36,0.13); border-color: rgba(251,191,36,0.2); }
  .cat-metalloid:hover, .cat-metalloid.active { background: rgba(251,191,36,0.22); border-color: rgba(251,191,36,0.5); box-shadow: 0 0 16px rgba(251,191,36,0.25); }

  .cat-halogen { background: rgba(244,114,182,0.13); border-color: rgba(244,114,182,0.2); }
  .cat-halogen:hover, .cat-halogen.active { background: rgba(244,114,182,0.22); border-color: rgba(244,114,182,0.5); box-shadow: 0 0 16px rgba(244,114,182,0.25); }

  .cat-lanthanide { background: rgba(192,132,252,0.13); border-color: rgba(192,132,252,0.2); }
  .cat-lanthanide:hover, .cat-lanthanide.active { background: rgba(192,132,252,0.22); border-color: rgba(192,132,252,0.5); box-shadow: 0 0 16px rgba(192,132,252,0.25); }

  .cat-actinide { background: rgba(251,113,133,0.13); border-color: rgba(251,113,133,0.2); }
  .cat-actinide:hover, .cat-actinide.active { background: rgba(251,113,133,0.22); border-color: rgba(251,113,133,0.5); box-shadow: 0 0 16px rgba(251,113,133,0.25); }

  .cat-unknown { background: rgba(107,114,128,0.13); border-color: rgba(107,114,128,0.2); }
  .cat-unknown:hover, .cat-unknown.active { background: rgba(107,114,128,0.22); border-color: rgba(107,114,128,0.5); }

  .group-label {
    display: flex; align-items: flex-end; justify-content: center;
    font-size: 0.55rem; color: var(--text-dim);
    padding-bottom: 4px;
  }

  .period-label {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem; color: var(--text-dim);
  }

  /* DETAIL PANEL */
  .detail-panel {
    border-top: 1px solid var(--border);
    padding: 28px 40px;
    display: none;
    animation: slideUp 0.25s ease;
  }

  .detail-panel.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-inner {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: start;
  }

  .detail-symbol-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .detail-sym-big {
    font-family: 'Fraunces', serif;
    font-size: 5rem;
    font-weight: 900;
    line-height: 1;
  }

  .detail-name-num {
    display: flex; align-items: center; gap: 10px;
  }

  .detail-name {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 300;
    font-style: italic;
  }

  .detail-num {
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .detail-cat-badge {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
    margin-top: 4px;
  }

  .detail-props {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px 24px;
  }

  .prop-item {}
  .prop-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .prop-value {
    font-size: 0.9rem;
    color: var(--text);
    font-weight: 500;
  }

  .detail-desc {
    grid-column: 1 / -1;
    font-size: 0.72rem;
    color: var(--text-dim);
    line-height: 1.7;
    margin-top: 4px;
    max-width: 680px;
    font-family: 'DM Mono', monospace;
    animation: haikuReveal 0.6s ease-out forwards;
  }

  @keyframes haikuReveal {
    from { opacity: 0; transform: translateY(8px); filter: blur(2px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  /* dim inactive */
  .pt-grid.filter-active .el:not(.cat-highlight) {
    opacity: 0.2;
    pointer-events: none;
  }

  /* Electron shell vis */
  .electron-vis {
    width: 80px; height: 80px;
    position: relative;
    margin-top: 8px;
  }

  .e-nucleus {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  .e-orbit {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: spin linear infinite;
  }

  .e-dot {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    top: -2.5px; left: 50%;
    margin-left: -2.5px;
  }

  @keyframes spin {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to { transform: translate(-50%,-50%) rotate(360deg); }
  }

  .placeholder-msg {
    padding: 24px 40px;
    font-size: 0.7rem;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    font-style: italic;
  }

  /* Dim class for category filter */
  .legend-item.selected { color: var(--text); }
  .legend-item.selected .legend-dot { box-shadow: 0 0 8px currentColor; }

  .footer {
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  .footer a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer a:hover {
    color: var(--accent);
  }

  .github-link {
    position: absolute;
    top: 32px;
    right: 40px;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .github-link a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .github-link a:hover {
    color: var(--accent);
  }

  /* RESPONSIVE QUERIES */
  @media (max-width: 1200px) {
    .pt-grid {
      grid-template-columns: repeat(18, 48px);
      grid-template-rows: repeat(10, 52px);
    }
  }

  @media (max-width: 1024px) {
    .pt-grid {
      grid-template-columns: repeat(18, 42px);
      grid-template-rows: repeat(10, 46px);
    }
    .el .sym { font-size: 0.9rem; }
    .el .name { font-size: 0.36rem; }
  }

  @media (max-width: 820px) {
    header {
      padding: 24px 30px 12px;
      flex-direction: column;
      gap: 6px;
    }
    .github-link {
      position: static;
      margin-top: 4px;
    }
    .legend { padding: 12px 30px; }
    .pt-grid {
      grid-template-columns: repeat(18, 36px);
      grid-template-rows: repeat(10, 40px);
      gap: 2px;
    }
    .el .sym { font-size: 0.8rem; }
    .el .name, .el .mass { display: none; }
    
    .detail-panel { padding: 24px 30px; }
    .detail-inner {
      grid-template-columns: 1fr;
      gap: 24px;
      text-align: center;
    }
    .detail-symbol-block { align-items: center; }
    .detail-props { grid-template-columns: repeat(2, 1fr); gap: 12px 16px; }
    .detail-desc { margin: 0 auto; }
    .haiku-hero { grid-column: 3 / 16; grid-row: 2 / 4; padding: 8px 10px; }
  }

  @media (max-width: 480px) {
    .pt-grid {
      grid-template-columns: repeat(18, 30px);
      grid-template-rows: repeat(10, 34px);
    }
    .el .sym { font-size: 0.7rem; }
    .el .num { font-size: 0.45rem; }
    .detail-props { grid-template-columns: 1fr; }
    .footer { display: none; }
    .haiku-hero { grid-column: 3 / 17; grid-row: 2 / 4; padding: 8px 8px; }
    .haiku-text { font-size: 0.8rem; }
  }
  </style>
  </head>
  <body>
  <div class="noise"></div>
  <header>
  <h1>Aggy's Periodic Table (Haiku Edition)</h1>
  <span>HAIKU. Because nature's not as simple as those dry textbooks make it out to be</span>
  <div class="github-link">
    <a href="https://github.com/AUAggy/periodic-table-haiku" target="_blank" rel="noopener">View Source on GitHub</a>
  </div>
  </header>

  <div class="main">
  <div class="legend" id="legend"></div>
  <div class="table-wrap">
    <div class="pt-grid" id="grid"></div>
  </div>
  <div id="detail-placeholder" class="placeholder-msg">← Click any element to view details</div>
  <div class="detail-panel" id="detail"></div>
  </div>

  <footer class="footer">
    Aggy's Periodic Table (Haiku Edition) is a free educational tool by 
    <a href="https://miaggy.com" target="_blank" rel="noopener">miaggy.com</a>
  </footer>

<script>
const CATEGORIES = {
  'reactive-nonmetal': { label: 'Reactive nonmetal', color: '#4ade80' },
  'noble-gas': { label: 'Noble gas', color: '#a78bfa' },
  'alkali-metal': { label: 'Alkali metal', color: '#f87171' },
  'alkaline-earth': { label: 'Alkaline earth', color: '#fb923c' },
  'transition-metal': { label: 'Transition metal', color: '#60a5fa' },
  'post-transition': { label: 'Post-transition', color: '#34d399' },
  'metalloid': { label: 'Metalloid', color: '#fbbf24' },
  'halogen': { label: 'Halogen', color: '#f472b6' },
  'lanthanide': { label: 'Lanthanide', color: '#c084fc' },
  'actinide': { label: 'Actinide', color: '#fb7185' },
  'unknown': { label: 'Unknown', color: '#6b7280' },
};

// [symbol, name, mass, category, period, group, electron_config, electronegativity, melting_pt, boiling_pt, density, discovered, desc]
const ELEMENTS = [
  [1,'H','Hydrogen',1.008,'reactive-nonmetal',1,1,'1s¹',2.20,-259.16,-252.88,0.00009,1766,'First in the lineup,\nHighly explosive and light,\nHindenburg\'s mistake.'],
  [2,'He','Helium',4.003,'noble-gas',1,18,'1s²',null,-272.20,-268.93,0.000164,1895,'Inert and noble,\nMakes your voice sound like a mouse,\nUp, up, and away.'],
  [3,'Li','Lithium',6.941,'alkali-metal',2,1,'[He] 2s¹',0.98,180.54,1342,0.534,1817,'Powering your phone,\nHighly reactive and wild,\nKeeps the mood swings down.'],
  [4,'Be','Beryllium',9.012,'alkaline-earth',2,2,'[He] 2s²',1.57,1287,2470,1.85,1798,'Strong and lightweight gem,\nDo not breathe my toxic dust,\nLungs will surely fail.'],
  [5,'B','Boron',10.81,'metalloid',2,13,'[He] 2s² 2p¹',2.04,2075,4000,2.34,1808,'Black and hard and weird,\nPlants need me to grow up tall,\nI am quite a bore.'],
  [6,'C','Carbon',12.011,'reactive-nonmetal',2,14,'[He] 2s² 2p²',2.55,3550,4027,2.267,1789,'Basis of all life,\nDiamond or a pencil lead,\nBuried deep for years.'],
  [7,'N','Nitrogen',14.007,'reactive-nonmetal',2,15,'[He] 2s² 2p³',3.04,-210.00,-195.79,0.001145,1772,'Most of what you breathe,\nKeeps the bags of chips quite crisp,\nCold enough to freeze.'],
  [8,'O','Oxygen',15.999,'reactive-nonmetal',2,16,'[He] 2s² 2p⁴',3.44,-218.79,-182.96,0.001331,1774,'Breath of life for you,\nMakes the iron turn to rust,\nFeed the hungry fire.'],
  [9,'F','Fluorine',18.998,'halogen',2,17,'[He] 2s² 2p⁵',3.98,-219.67,-188.11,0.001696,1886,'Most reactive of all,\nWants your electrons so bad,\nWill eat through your jar.'],
  [10,'Ne','Neon',20.18,'noble-gas',2,18,'[He] 2s² 2p⁶',null,-248.59,-246.05,0.0009,1898,'Glow in Vegas nights,\nI react to nobody,\nNoble and alone.'],
  [11,'Na','Sodium',22.99,'alkali-metal',3,1,'[Ne] 3s¹',0.93,97.79,882.8,0.968,1807,'Soft enough to cut,\nI explode in water\'s touch,\nSalt of the earth\'s tears.'],
  [12,'Mg','Magnesium',24.305,'alkaline-earth',3,2,'[Ne] 3s²',1.31,650,1090,1.738,1755,'Burning bright and white,\nBlinding light and sudden heat,\nFlares in dark of night.'],
  [13,'Al','Aluminium',26.982,'post-transition',3,13,'[Ne] 3s² 3p¹',1.61,660.32,2519,2.70,1825,'Light and shiny foil,\nWrapping up your leftovers,\nI am everywhere.'],
  [14,'Si','Silicon',28.085,'metalloid',3,14,'[Ne] 3s² 3p²',1.90,1414,3265,2.329,1824,'Brain of your machine,\nSand upon the ocean shore,\nSilicon Valley.'],

function buildLegend() {
  const leg = document.getElementById('legend');
  Object.entries(CATEGORIES).forEach(([key, {label, color}]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cat = key;
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${label}`;
    item.addEventListener('click', () => toggleFilter(key));
    leg.appendChild(item);
  });
}

let activeFilter = null;
function toggleFilter(cat) {
  const grid = document.getElementById('grid');
  const items = document.querySelectorAll('.legend-item');
  if (activeFilter === cat) {
    activeFilter = null;
    grid.classList.remove('filter-active');
    items.forEach(i => i.classList.remove('selected'));
    document.querySelectorAll('.el').forEach(e => e.classList.remove('cat-highlight'));
  } else {
    activeFilter = cat;
    grid.classList.add('filter-active');
    items.forEach(i => i.classList.toggle('selected', i.dataset.cat === cat));
    document.querySelectorAll('.el').forEach(e => {
      e.classList.toggle('cat-highlight', e.dataset.cat === cat);
    });
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  const elemMap = {};
  ELEMENTS.forEach(e => { elemMap[e[0]] = e; });

  // Create 10 rows × 18 cols
  for (let row = 1; row <= 10; row++) {
    for (let col = 1; col <= 18; col++) {
      const cell = document.createElement('div');
      cell.style.gridColumn = col;
      cell.style.gridRow = row;
      grid.appendChild(cell);
    }
  }

  MAIN_TABLE.forEach(([z, col, row]) => {
    const e = elemMap[z];
    if (!e) return;
    const [,sym,name,mass,cat] = e;
    const cell = document.createElement('div');
    cell.className = `el cat-${cat}`;
    cell.dataset.z = z;
    cell.dataset.cat = cat;
    cell.style.gridColumn = col;
    cell.style.gridRow = row;
    cell.innerHTML = `<div class="num">${z}</div><div class="sym">${sym}</div><div class="name">${name}</div><div class="mass">${parseFloat(mass).toFixed(0)}</div>`;
    cell.addEventListener('click', () => showDetail(z));

  grid.appendChild(hero);
}

  hero.style.borderColor = `${color}66`;

function buildElectronVis(econf, color) {
  // Simple shell count from config
  const shells = parseShells(econf);
  if (!shells.length) return '';
  const maxShells = shells.length;
  const size = 90 + maxShells * 18;
  const half = size / 2;
  let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="margin-top:10px;opacity:0.85">`;
  svg += `<circle cx="${half}" cy="${half}" r="8" fill="${color}" opacity="0.9"/>`;
  shells.forEach((count, i) => {
    const r = 18 + i * 17;
    const dur = 3 + i * 1.2;
    svg += `<circle cx="${half}" cy="${half}" r="${r}" fill="none" stroke="${color}" stroke-width="0.7" opacity="0.25"/>`;
    for (let e = 0; e < Math.min(count, 12); e++) {
      const angle = (e / Math.min(count, 12)) * 2 * Math.PI;
      const ex = half + r * Math.cos(angle);
      const ey = half + r * Math.sin(angle);
      svg += `<circle cx="${ex}" cy="${ey}" r="2.5" fill="${color}" opacity="0.9"><animateTransform attributeName="transform" type="rotate" from="0 ${half} ${half}" to="360 ${half} ${half}" dur="${dur}s" repeatCount="indefinite"/></circle>`;
    }
  });
  svg += '</svg>';
  return svg;
}

function parseShells(econf) {
  // Simplified: count electrons per shell based on principal quantum number
  const map = { '1s':1,'2s':2,'2p':2,'3s':3,'3p':3,'3d':3,'4s':4,'4p':4,'4d':4,'4f':4,'5s':5,'5p':5,'5d':5,'5f':5,'6s':6,'6p':6,'6d':6,'7s':7,'7p':7 };
  const shellCounts = {};
  const re = /(\d[spdf]\d+)/g;
  let m;
  // Remove noble gas core notation
  const conf = econf.replace(/\[[A-Z][a-z]*\]\s*/,'');
  while ((m = re.exec(conf)) !== null) {
    const part = m[1];
    const shell = parseInt(part[0]);
    const count = parseInt(part.slice(2));
    shellCounts[shell] = (shellCounts[shell] || 0) + count;
  }
  // Also parse the part without numbers if config has noble gas shorthand
  const nums = Object.keys(shellCounts).map(Number).sort();
  if (!nums.length) {
    // fallback: deduce from atomic number via full config
    return [];
  }
  const maxShell = Math.max(...nums);
  return Array.from({length: maxShell}, (_,i) => shellCounts[i+1] || 0);
}

function setInitialHaiku() {
  const e = ELEMENTS[Math.floor(Math.random() * ELEMENTS.length)];
  if (!e) return;
  const color = catColor(e[4]);
  const catLabel = CATEGORIES[e[4]]?.label || e[4];
  updateHaikuHero(e, color, catLabel, false);
}
